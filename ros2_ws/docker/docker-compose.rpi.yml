# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.rpi.yml — Raspberry Pi 5 with real Arduino
#
# Usage (from Project-NUEVO/ repository root):
#   docker compose -f ros2_ws/docker/docker-compose.rpi.yml up -d --build --wait
#
# First startup builds the ROS workspace with colcon (~60s), then launches the
# bridge node automatically. Additional ROS nodes can be started with
# `docker compose exec`.
# Subsequent restarts reuse the cached build artifacts (named volumes): ~5s.
#   - Python / .msg changes → docker compose restart  (no image rebuild)
#   - Pip dep changes        → docker compose build    (rebuilds image layer)
# ─────────────────────────────────────────────────────────────────────────────

services:
  ros2_runtime:
    build:
      context: ../..
      dockerfile: ros2_ws/docker/Dockerfile.robot

    image: ros2-runtime:latest

    # Entrypoint builds/sources the workspace, then this launch file becomes
    # the container's main process. If the bridge exits, Docker restarts it.
    command: ["ros2", "launch", "bridge", "bridge.launch.py"]

    # ROS2 DDS (Fast-DDS / Cyclone) uses UDP multicast — requires host networking.
    network_mode: host

    # Hardware devices are optional at container startup. Bind /dev so devices
    # such as /dev/ttyAMA0, /dev/rplidar, and /dev/video10 can appear after the
    # container is already running, then restrict access by device class.
    device_cgroup_rules:
      - "c 81:* rmw"    # V4L2 cameras, including /dev/video10.
      - "c 188:* rmw"   # USB serial adapters, including /dev/rplidar targets.
      - "c 204:* rmw"   # Raspberry Pi UARTs, including /dev/ttyAMA0.

    group_add:
      - dialout
      - video

    volumes:
      # Host device namespace — optional hardware must not block container startup.
      - /dev:/dev
      # udev state lets stable symlinks such as /dev/rplidar resolve in-container.
      - /run/udev:/run/udev:ro
      # ROS workspace source — live from repo (edits take effect on restart).
      - ../../ros2_ws/src:/ros2_ws/src:ro
      # Shared Python bridge runtime used by the ROS wrapper package.
      - ../../nuevo_ui/backend:/workspace/nuevo_bridge_source:ro
      # Writable runtime data for auth/users and future bridge state.
      - ros2_runtime_data:/data
      # colcon build cache — only slow on first run. Wipe with: docker compose down -v
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install
      # Writable runtime artifacts (debug images, plots, logs) live here.
      - ../../ros2_ws/runtime_output:/runtime_output

    environment:
      # Restrict DDS discovery to this host. This replaces the deprecated
      # ROS_LOCALHOST_ONLY flag and prevents ROS2 nodes from bleeding across
      # RPis on the same network. Cross-machine links such as Jetson GPS use
      # explicit TCP instead of DDS multicast.
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - NUEVO_BRIDGE_SOURCE=/workspace/nuevo_bridge_source
      - NUEVO_USERS_FILE=/data/users.json
      - NUEVO_SERIAL_PORT=/dev/ttyAMA0
      - NUEVO_SERIAL_BAUD=200000
      - PI_CAMERA_DEVICE=/dev/video10


    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'source /opt/ros/jazzy/setup.bash && test -f /ros2_ws/install/setup.bash && source /ros2_ws/install/setup.bash && for package in robot sensors bridge bridge_interfaces vision rplidar_ros; do ros2 pkg prefix \"$$package\" >/dev/null || exit 1; done && python3 -c \"import urllib.request; urllib.request.urlopen(\\\"http://127.0.0.1:8000/health\\\", timeout=3).read()\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 240s   # allow time for first-run colcon build and bridge start on RPi

volumes:
  ros2_runtime_data:
  ros2_build:
  ros2_install:
